<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Images of Christ</title>
    <style>
        body {
            background: black;
        }
        #wrapper{
            width: 600px;
            margin: 0 auto;
        }
        nav {
            color: white;
            text-align: center;
            font-family: Haettenschweiler, 'Arial Narrow Bold', sans-serif;
        }
        #gallery{
            display: grid;
            grid-template-columns: 200px 200px 200px;
            border: 15px solid rgb(255, 255, 255);
            width: 100%;
            background-color: #ddd;
            background-image:
                linear-gradient(45deg, #ccc 26%, transparent 26%), 
                linear-gradient(135deg, #ccc 26%, transparent 26%),
                linear-gradient(45deg, transparent 75%, #ccc 75%),
                linear-gradient(135deg, transparent 75%, #ccc 75%);
            background-size: 20px 20px; 
            background-position: 0 0, 10px 0, 10px -10px, 0px 10px; 
            
        }
        #gallery a {
            cursor: url('images/christus.png'), pointer;
        }
        #gallery img {
            
            width: 200px; 
            height: 300px;

            opacity:50%;
            display:block;
        }
        #gallery img:hover{
            opacity: 100%;
        }
    </style>
</head>
<body>
    <div id="wrapper">
        <nav>
            <h1>Christ Art Gallery</h1>
        </nav>
        <main>
            <div id="gallery">
                <a href="images/big/img1.jpg" target="_blank"><img src="images/small/img1.jpg" alt="Christ art image 1"></a>
                <a href="images/big/img2.jpg" target="_blank"><img src="images/small/img2.jpg" alt="Christ art image 2"></a>
                <a href="images/big/img3.jpg" target="_blank"><img src="images/small/img3.jpg" alt="Christ art image 3"></a>
                <a href="images/big/img4.jpg" target="_blank"><img src="images/small/img4.jpg" alt="Christ art image 4"></a>
                <a href="images/big/img5.jpg" target="_blank"><img src="images/small/img5.jpg" alt="Christ art image 5"></a>
                <a href="images/big/img6.jpg" target="_blank"><img src="images/small/img6.jpg" alt="Christ art image 6"></a>
            </div>
        </main>
    </div>
</body>
</html>
